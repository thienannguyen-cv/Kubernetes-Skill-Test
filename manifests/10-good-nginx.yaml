apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-nginx
  namespace: skill-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: good-nginx
  template:
    metadata:
      labels:
        app: good-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: good-nginx
  namespace: skill-lab
spec:
  selector:
    app: good-nginx
  ports:
    - port: 80
      targetPort: 80
